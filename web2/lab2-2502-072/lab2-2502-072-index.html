<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>图书商城</title>
    <link rel="stylesheet" href="CSS/lab2-2502-072-index.css">
</head>
<body>
    <header class="header">
        <nav class="nav">
            <ul>
                <li><a href="#">首页</a></li>
                <li><a href="#">图书分类</a></li>
                <li><a href="#">热门推荐</a></li>
                <li><a href="#">新书上市</a></li>
                <li><a href="#">关于我们</a></li>
            </ul>
        </nav>
        <div class="clearfix"></div>
    </header>

    <div class="container">
        <aside class="left-sidebar">
            <h3>图书分类导航</h3>
            <ul>
                <li><a href="#">文学小说</a></li>
                <li><a href="#">计算机技术</a></li>
                <li><a href="#">经管励志</a></li>
                <li><a href="#">生活艺术</a></li>
                <li><a href="#">少儿读物</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <section class="book-show">
                <h2>图书展示</h2>
                <div class="book-item">
                    <img src="img/2.jpg" alt="图书封面">
                    <div class="book-info">
                        <h4>计算机组成原理</h4>
                        <p>经典计算机底层原理教材</p>
                    </div>
                </div>
                <div class="book-item">
                    <img src="img/3.jpg" alt="图书封面">
                    <div class="book-info">
                        <h4>C++ Primer</h4>
                        <p>C++入门经典书籍</p>
                    </div>
                </div>
                <div class="clearfix"></div>
            </section>

            <section class="hot-recommend">
                <h2>热门推荐</h2>
                <div class="recommend-item">
                    <img src="img/4.jpg" alt="推荐图书">
                    <p>活着</p>
                </div>
                <div class="recommend-item">
                    <img src="img/5.jpg" alt="推荐图书">
                    <p>平凡的世界</p>
                </div>
                <div class="recommend-item">
                    <img src="img/6.jpg" alt="推荐图书">
                    <p>三体</p>
                </div>
                <div class="clearfix"></div>
            </section>

            <section class="new-book">
                <h2>新书上市</h2>
                <table border="1" cellpadding="8" cellspacing="0">
                    <tr>
                        <th>书名</th>
                        <th>作者</th>
                        <th>定价</th>
                        <th>出版日期</th>
                    </tr>
                    <tr>
                        <td>AI时代的编程思维</td>
                        <td>李航</td>
                        <td>¥89.00</td>
                        <td>2025-01-15</td>
                    </tr>
                    <tr>
                        <td>数据结构与算法分析</td>
                        <td>陈越</td>
                        <td>¥79.00</td>
                        <td>2025-02-20</td>
                    </tr>
                </table>
            </section>
        </main>

        <aside class="right-sidebar">
            <h3>促销信息</h3>
            <div class="promo">
                <p>🔥 全场满99减30</p>
                <p>📚 新书8折特惠</p>
                <p>🎁 会员专享福利</p>
            </div>
        </aside>
        <div class="clearfix"></div>
    </div>

    <div class="back-top">
        <a href="#">回到顶部</a>
    </div>
</body>
</html>
